services:
  
  backend:
    container_name: simple_blog_backend
    # image: thepujon/simple_blog_backend:1.5
    build:
      context: ./
      dockerfile: Dockerfile  
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-mongodb://mongodb:27017/job_tracker?replicaSet=rs0&directConnection=true}
      DATABASE_HOST: mongodb
      DATABASE_PORT: 27017
      DATABASE_NAME: job_tracker
      NODE_ENV: ${NODE_ENV}


      REDIS_HOST: redis-stack
      REDIS_PORT: 6379
      REDIS_USER: ${REDIS_USER}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: 1000
    depends_on:
      mongodb:
        condition: service_healthy
      redis-stack:
        condition: service_healthy
    networks:
      - app_network
