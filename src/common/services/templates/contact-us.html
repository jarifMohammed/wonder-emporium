<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>New Contact Us Message</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h2 style="color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px;">New Contact Us Message</h2>
  
  <div style="background-color: #f9f9f9; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
    <p style="margin: 5px 0;"><strong>From Name:</strong> {{name}}</p>
    <p style="margin: 5px 0;"><strong>From Email:</strong> {{email}}</p>
  </div>

  <h3 style="color: #2c3e50;">Message:</h3>
  <div style="background-color: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 5px; white-space: pre-wrap;">{{message}}</div>
</body>
</html>
